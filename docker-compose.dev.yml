name: jewelcancy-dev

services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    image: jewelcancy/frontend:dev
    container_name: jewelcancy-frontend-dev
    restart: unless-stopped
    environment:
      VITE_API_URL: ${DEV_VITE_API_URL:-http://localhost:5000/api/v1}
      VITE_SOCKET_URL: ${DEV_VITE_SOCKET_URL:-http://localhost:5000}
      VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-}
      VITE_SUPPORT_EMAIL: ${VITE_SUPPORT_EMAIL:-support@jewelcancy.com}
      VITE_DEBUG_MODE: ${DEV_VITE_DEBUG_MODE:-true}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    ports:
      - '${DEV_FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    command: npm run dev -- --host 0.0.0.0 --port 5173

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    image: jewelcancy/backend:dev
    container_name: jewelcancy-backend-dev
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-JewelCancy}
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-jobs_admin}:${MONGO_INITDB_ROOT_PASSWORD:-changeThisMongoPassword}@mongodb:27017/${MONGO_INITDB_DATABASE:-jobplacements}?authSource=admin
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-jobs_admin}:${MONGO_INITDB_ROOT_PASSWORD:-changeThisMongoPassword}@mongodb:27017/${MONGO_INITDB_DATABASE:-jobplacements}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_random_64_character_secret_before_production}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      CLIENT_URL: ${DEV_CLIENT_URL:-http://localhost:5173}
      FRONTEND_URL: ${DEV_FRONTEND_URL:-http://localhost:5173}
      DEV_ALLOWED_ORIGINS: ${DEV_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:80}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@jewelcancy.com}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-15}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    ports:
      - '${DEV_BACKEND_PORT:-5000}:5000'
    volumes:
      - ./server:/app
      - backend_node_modules:/app/node_modules
      - ./server/uploads:/app/uploads
      - ./server/logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network
    command: npm run dev
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http=require('http');const req=http.get({host:'127.0.0.1',port:5000,path:'/health',timeout:3000},res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.on('timeout',()=>{req.destroy();process.exit(1);});",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  mongodb:
    image: mongo:7.0
    container_name: jewelcancy-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-jobs_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeThisMongoPassword}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-jobplacements}
    ports:
      - '${DEV_MONGODB_PORT:-27017}:27017'
    volumes:
      - mongodb_dev_data:/data/db
      - mongodb_dev_config:/data/configdb
    networks:
      - app-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand({ ping: 1 }).ok" | grep 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  frontend_node_modules:
  backend_node_modules:
  mongodb_dev_data:
  mongodb_dev_config:

networks:
  app-network:
    driver: bridge
