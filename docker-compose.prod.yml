name: jewelcancy-production

services:
  router:
    image: nginx:1.27-alpine
    container_name: jewelcancy-router
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    command: >
      /bin/sh -c "
        if [ ! -s /etc/letsencrypt/live/www.jewelcancy.com/fullchain.pem ]; then
          mkdir -p /etc/letsencrypt/live/www.jewelcancy.com;
          openssl req -x509 -nodes -newkey rsa:2048 -days 1
            -keyout /etc/letsencrypt/live/www.jewelcancy.com/privkey.pem
            -out /etc/letsencrypt/live/www.jewelcancy.com/fullchain.pem
            -subj '/CN=www.jewelcancy.com' >/dev/null 2>&1;
        fi;
        nginx;
        while :; do sleep 6h; nginx -s reload || true; done
      "
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/router-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-https://www.jewelcancy.com/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-https://www.jewelcancy.com}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-}
        VITE_SUPPORT_EMAIL: ${VITE_SUPPORT_EMAIL:-support@jewelcancy.com}
        VITE_DEBUG_MODE: ${VITE_DEBUG_MODE:-false}
    image: ${DOCKER_IMAGE_PREFIX:-jewelcancy}/frontend:${IMAGE_TAG:-latest}
    container_name: jewelcancy-frontend
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    image: ${DOCKER_IMAGE_PREFIX:-jewelcancy}/backend:${IMAGE_TAG:-latest}
    container_name: jewelcancy-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/jobplacements}
      MONGO_URL: ${MONGO_URL:-mongodb://mongodb:27017/jobplacements}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_random_64_character_secret_before_production}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      JWT_COOKIE_MAX_AGE_MS: ${JWT_COOKIE_MAX_AGE_MS:-}
      CLIENT_URL: ${CLIENT_URL:-https://www.jewelcancy.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://www.jewelcancy.com}
      PRODUCTION_URL: ${PRODUCTION_URL:-https://www.jewelcancy.com}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://www.jewelcancy.com,https://jewelcancy.com,http://localhost:5173}
      LEGACY_ALLOWED_ORIGINS: ${LEGACY_ALLOWED_ORIGINS:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@jewelcancy.com}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-26214400}
      CHAT_ATTACHMENT_MAX_SIZE: ${CHAT_ATTACHMENT_MAX_SIZE:-26214400}
      PROFILE_IMAGE_MAX_SIZE: ${PROFILE_IMAGE_MAX_SIZE:-10485760}
      COMPANY_LOGO_MAX_SIZE: ${COMPANY_LOGO_MAX_SIZE:-10485760}
      BLOG_IMAGE_MAX_SIZE: ${BLOG_IMAGE_MAX_SIZE:-26214400}
      RESUME_MAX_SIZE: ${RESUME_MAX_SIZE:-26214400}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-15}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
      PUPPETEER_SKIP_DOWNLOAD: "true"
    expose:
      - "3000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const req=http.get({host:'127.0.0.1',port:3000,path:'/health',timeout:3000},res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.on('timeout',()=>{req.destroy();process.exit(1);});",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mongodb:
    image: mongo:7.0
    container_name: jewelcancy-mongodb
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:v2.11.0
    container_name: jewelcancy-certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh
    command: >
      -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodb_data:
  mongodb_config:
  backend_uploads:
  backend_logs:
  certbot_www:
  letsencrypt:

networks:
  app-network:
    driver: bridge
